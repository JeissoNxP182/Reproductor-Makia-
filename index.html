<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Reproductor Streaming</title>
  <!-- HLS.js para soportar enlaces .m3u8 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: #121212;
      color: #ffffff;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    /* Formulario para ingresar la URL */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    input[type="url"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background-color: #1e1e1e;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    button.btn-load {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #e50914;
      color: #fff;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button.btn-load:active {
      background-color: #b20710;
    }

    /* Reproductor nativo adaptable */
    .player-wrapper {
      width: 100%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
    }

    video {
      width: 100%;
      height: auto;
      max-height: 70vh;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Entrada de URL optimizada para teclado táctil -->
    <div class="input-group">
      <input type="url" id="streamUrl" placeholder="Pega el enlace MP4 o M3U8..." autocomplete="off">
      <button class="btn-load" id="loadBtn">Cargar Video</button>
    </div>

    <!-- Contenedor del reproductor -->
    <div class="player-wrapper">
      <video id="video" controls playsinline preload="metadata"></video>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const loadBtn = document.getElementById('loadBtn');
    const streamUrlInput = document.getElementById('streamUrl');

    let hls = null;

    function cargarVideo() {
      const url = streamUrlInput.value.trim();
      if (!url) return;

      // Limpiar instancia previa de HLS si existe
      if (hls) {
        hls.destroy();
      }

      // 1. Compatibilidad con M3U8 mediante HLS.js
      if (url.includes('.m3u8') && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      } 
      // 2. Soporte nativo de Safari en iOS o archivos MP4 estándar
      else {
        video.src = url;
      }

      // Asegurar que NO se reproduzca de forma automática
      video.pause();
    }

    loadBtn.addEventListener('click', cargarVideo);
  </script>

</body>
</html>
