<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reproductor Streaming</title>
  
  <!-- HLS.js para enlaces .m3u8 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  
  <!-- SDK oficial de Google Cast (para transmitir a la TV) -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #0d0e12;
      color: #e1e1e6;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .app-header {
      width: 100%;
      max-width: 650px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    /* Botón de Transmitir a la TV */
    google-cast-launcher {
      width: 32px;
      height: 32px;
      cursor: pointer;
      --connected-color: #3b82f6;
      --disconnected-color: #ffffff;
    }

    .container {
      width: 100%;
      max-width: 650px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Panel de entrada neutro */
    .stream-input-card {
      background: #161822;
      border: 1px solid #282a38;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    input[type="url"] {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #2d3042;
      background-color: #0d0e12;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: #3b82f6;
    }

    .btn-play {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-play:active {
      background: #1d4ed8;
      transform: scale(0.98);
    }

    /* Marco del Reproductor */
    .player-card {
      width: 100%;
      background: #000000;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #282a38;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div class="app-header">
    <h1>REPRODUCTOR STREAM</h1>
    <!-- Ícono nativo para transmitir a la Smart TV / Chromecast -->
    <google-cast-launcher title="Transmitir a la TV"></google-cast-launcher>
  </div>

  <div class="container">
    <!-- Entrada de URL -->
    <div class="stream-input-card">
      <div class="input-wrapper">
        <input type="url" id="streamUrl" placeholder="Pega la URL de tu transmisión (.m3u8 o .mp4)" autocomplete="off">
      </div>
      <button class="btn-play" id="loadBtn">
        <span>▶</span> Cargar video
      </button>
    </div>

    <!-- Pantalla de video -->
    <div class="player-card">
      <video id="video" controls playsinline preload="metadata"></video>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const loadBtn = document.getElementById('loadBtn');
    const streamUrlInput = document.getElementById('streamUrl');

    let hls = null;

    // Inicializar Google Cast
    window.__onGCastApiAvailable = function(isAvailable) {
      if (isAvailable) {
        cast.framework.CastContext.getInstance().setOptions({
          receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
          autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
        });
      }
    };

    function reproducirStream() {
      const url = streamUrlInput.value.trim();
      if (!url) return;

      if (hls) {
        hls.destroy();
      }

      // Reproducción M3U8
      if (url.includes('.m3u8') && Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      } 
      // Reproducción MP4 directa
      else {
        video.src = url;
      }

      // No se auto-reproduce
      video.pause();
    }

    loadBtn.addEventListener('click', reproducirStream);
  </script>

</body>
</html>
