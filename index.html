<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor Streaming</title>
  
  <!-- Plyr.js CSS -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <!-- Hls.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <!-- Plyr.js CDN -->
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

  <style>
    :root {
      /* Color principal de acento */
      --plyr-color-main: #e50914;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #0b0b0c;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Marco del reproductor sin contenedores extra ni bordes */
    .player-container {
      width: 100%;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 16 / 9;
      position: relative;
    }

    .plyr {
      height: 100%;
      width: 100%;
      border-radius: 0;
    }

    /* Feedback de salto rápido (-10s / +10s) */
    .seek-feedback {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    .seek-feedback.left { left: 10%; }
    .seek-feedback.right { right: 10%; }
    .seek-feedback.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="player-container" id="playerWrapper">
    <!-- Indicadores de salto -->
    <div class="seek-feedback left" id="feedbackLeft">⏮ -10s</div>
    <div class="seek-feedback right" id="feedbackRight">+10s ⏭</div>

    <!-- Etiqueta nativa de Video -->
    <video id="player" playsinline controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Obtener parámetros de la URL
      const urlParams = new URLSearchParams(window.location.search);
      const videoUrl = urlParams.get('v') || urlParams.get('url');
      const posterUrl = urlParams.get('p') || urlParams.get('poster');

      const videoElement = document.getElementById('player');
      const wrapper = document.getElementById('playerWrapper');
      const feedbackLeft = document.getElementById('feedbackLeft');
      const feedbackRight = document.getElementById('feedbackRight');

      if (posterUrl) {
        videoElement.setAttribute('poster', posterUrl);
      }

      let playerInstance = null;

      // Lista de controles solicitados
      const defaultControls = [
        'play-large', 'restart', 'play', 'progress', 'current-time', 
        'duration', 'mute', 'volume', 'settings', 'pip', 'airplay', 'fullscreen'
      ];

      // Inicializar Plyr con soporte de calidad opcional
      function initPlyr(qualityOptions = [], qualityDefault = -1, qualityChangeCallback = null) {
        const config = {
          autoplay: false, // Desactivado por completo
          controls: defaultControls,
          tooltips: { controls: true, seek: true },
          speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
          resetOnEnd: true
        };

        if (qualityOptions.length > 0) {
          config.quality = {
            default: qualityDefault,
            options: qualityOptions,
            forced: true,
            onChange: qualityChangeCallback
          };
        }

        playerInstance = new Plyr(videoElement, config);
      }

      // 2. Cargar fuente (HLS .m3u8 o MP4)
      if (videoUrl) {
        if (videoUrl.includes('.m3u8') && Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(videoUrl);
          hls.attachMedia(videoElement);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            const levels = hls.levels;
            const availableQualities = levels.map(l => l.height).filter(Boolean);
            availableQualities.unshift(-1); // Opción Auto

            initPlyr(availableQualities, -1, (newQuality) => {
              if (newQuality === -1) {
                hls.currentLevel = -1;
              } else {
                hls.levels.forEach((level, levelIndex) => {
                  if (level.height === newQuality) {
                    hls.currentLevel = levelIndex;
                  }
                });
              }
            });
          });
        } else {
          // MP4 estándar o Safari con soporte HLS nativo
          videoElement.src = videoUrl;
          initPlyr();
        }
      } else {
        initPlyr();
      }

      // 3. Doble Clic / Doble Toque en 35% izquierdo (-10s) y 35% derecho (+10s)
      let lastTap = 0;

      function showFeedback(element) {
        element.classList.add('show');
        setTimeout(() => element.classList.remove('show'), 500);
      }

      wrapper.addEventListener('click', (e) => {
        // Evitar activar el salto si se toca la barra de controles inferior
        if (e.target.closest('.plyr__controls')) return;

        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;

        if (tapLength < 300 && tapLength > 0) {
          const rect = wrapper.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const width = rect.width;
          const percentage = (clickX / width) * 100;

          if (playerInstance) {
            if (percentage <= 35) {
              playerInstance.rewind(10);
              showFeedback(feedbackLeft);
            } else if (percentage >= 65) {
              playerInstance.forward(10);
              showFeedback(feedbackRight);
            }
          }
        }
        lastTap = currentTime;
      });
    });
  </script>
</body>
</html>
